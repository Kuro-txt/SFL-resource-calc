<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sunflower Land - Market Calculator & Auto Sync</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --card-bg: #16213e;
      --accent-color: #0f3460;
      --highlight: #00fff5;
      --danger: #e94560;
      --text-color: #ffffff;
      --subtext: #a0a0a0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    h1, h2 {
      margin-top: 0;
      color: var(--highlight);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input, select, button {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--accent-color);
      background-color: var(--accent-color);
      color: var(--text-color);
      font-size: 15px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--highlight);
    }

    button {
      background-color: var(--highlight);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
      border: none;
    }

    button:hover {
      background-color: #00cccc;
    }

    /* Auto-Sync Toggle Bar */
    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--accent-color);
      padding: 12px 16px;
      border-radius: 8px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #4e4e50;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--highlight);
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    /* Status Messages */
    #statusMessage {
      font-size: 14px;
      margin-top: 8px;
      min-height: 20px;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid var(--accent-color);
    }

    th {
      color: var(--subtext);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- HEADER & FARM SYNC CARD -->
    <div class="card">
      <h1>🌻 Sunflower Land Market & Sync Tool</h1>
      
      <div class="form-group">
        <label for="farmId">Farm ID:</label>
        <input type="number" id="farmId" placeholder="e.g. 12345" />
      </div>

      <div class="form-group">
        <label for="apiKey">API Key (Optional):</label>
        <input type="password" id="apiKey" placeholder="Optional API Key for private data" />
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 16px;">
        <button onclick="fetchFarmInventory()">🔄 Sync Farm Inventory</button>
      </div>

      <!-- 00:00 UTC Auto-Sync Toggle -->
      <div class="sync-bar">
        <span>⚡ Cloud Auto-Sync (00:00 UTC)</span>
        <label class="switch">
          <input type="checkbox" id="autoSyncToggle" onchange="toggleAutoSync()" />
          <span class="slider"></span>
        </label>
      </div>

      <div id="statusMessage"></div>
    </div>

    <!-- MARKET CALCULATOR CARD -->
    <div class="card">
      <h2>📊 Market Calculator</h2>
      
      <div class="form-group">
        <label for="taxRate">Market Tax Rate:</label>
        <select id="taxRate" onchange="calculateMarket()">
          <option value="0.10">10% Standard Tax</option>
          <option value="0.05">5% Goblin Discount</option>
          <option value="0.00">0% No Tax</option>
        </select>
      </div>

      <div class="form-group">
        <label for="itemSelect">Select Crop/Resource:</label>
        <select id="itemSelect" onchange="calculateMarket()">
          <option value="Sunflower">Sunflower</option>
          <option value="Potato">Potato</option>
          <option value="Pumpkin">Pumpkin</option>
          <option value="Carrot">Carrot</option>
          <option value="Cabbage">Cabbage</option>
          <option value="Beetroot">Beetroot</option>
          <option value="Cauliflower">Cauliflower</option>
          <option value="Parsnip">Parsnip</option>
          <option value="Eggplant">Eggplant</option>
          <option value="Corn">Corn</option>
          <option value="Radish">Radish</option>
          <option value="Wheat">Wheat</option>
          <option value="Kale">Kale</option>
        </select>
      </div>

      <div class="form-group">
        <label for="itemQuantity">Quantity:</label>
        <input type="number" id="itemQuantity" value="100" oninput="calculateMarket()" />
      </div>

      <div class="form-group">
        <label for="unitPrice">Unit Price (SFL / Coins):</label>
        <input type="number" id="unitPrice" step="0.0001" value="0.01" oninput="calculateMarket()" />
      </div>

      <div class="table-container">
        <table>
          <tr>
            <th>Gross Value</th>
            <th>Tax Amount</th>
            <th>Net Revenue</th>
          </tr>
          <tr>
            <td id="grossValue">0.00</td>
            <td id="taxAmount" style="color: var(--danger);">0.00</td>
            <td id="netRevenue" style="color: var(--highlight); font-weight: bold;">0.00</td>
          </tr>
        </table>
      </div>
    </div>

  </div>

  <script>
    // Live Render Backend URL
    const BACKEND_URL = "https://sfl-calculator-backend.onrender.com";

    // Initialize saved settings on page load
    document.addEventListener('DOMContentLoaded', () => {
      const savedFarmId = localStorage.getItem('sfl_farm_id');
      const savedApiKey = localStorage.getItem('sfl_api_key');
      const savedAutoSync = localStorage.getItem('sfl_auto_sync') === 'true';

      if (savedFarmId) document.getElementById('farmId').value = savedFarmId;
      if (savedApiKey) document.getElementById('apiKey').value = savedApiKey;
      
      const toggle = document.getElementById('autoSyncToggle');
      if (toggle) toggle.checked = savedAutoSync;

      calculateMarket();
    });

    // --- MARKET CALCULATOR LOGIC ---
    function calculateMarket() {
      const qty = parseFloat(document.getElementById('itemQuantity').value) || 0;
      const price = parseFloat(document.getElementById('unitPrice').value) || 0;
      const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;

      const gross = qty * price;
      const tax = gross * taxRate;
      const net = gross - tax;

      document.getElementById('grossValue').innerText = gross.toFixed(4);
      document.getElementById('taxAmount').innerText = tax.toFixed(4);
      document.getElementById('netRevenue').innerText = net.toFixed(4);
    }

    // --- MANUAL FARM SYNC LOGIC ---
    async function fetchFarmInventory() {
      const farmId = document.getElementById('farmId').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const statusDiv = document.getElementById('statusMessage');

      if (!farmId) {
        alert('Please enter a valid Farm ID.');
        return;
      }

      // Save local credentials
      localStorage.setItem('sfl_farm_id', farmId);
      if (apiKey) localStorage.setItem('sfl_api_key', apiKey);

      statusDiv.style.color = '#ffffff';
      statusDiv.innerText = '⏳ Syncing with Sunflower Land API...';

      try {
        const response = await fetch(`https://api.sunflower-land.com/community/farms/${farmId}`);
        if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

        const data = await response.json();
        const inventory = data.inventory || {};

        statusDiv.style.color = '#00fff5';
        statusDiv.innerText = `✅ Successfully synced Farm #${farmId}!`;

        // Auto-fill quantity if selected item exists in inventory
        const selectedItem = document.getElementById('itemSelect').value;
        if (inventory[selectedItem]) {
          document.getElementById('itemQuantity').value = parseFloat(inventory[selectedItem]);
          calculateMarket();
        }
      } catch (err) {
        statusDiv.style.color = '#e94560';
        statusDiv.innerText = `❌ Sync failed: ${err.message}`;
      }
    }

    // --- 00:00 UTC AUTO-SYNC BACKEND TOGGLE ---
    async function toggleAutoSync() {
      const farmId = document.getElementById('farmId').value.trim();
      const isChecked = document.getElementById('autoSyncToggle').checked;
      const statusDiv = document.getElementById('statusMessage');

      if (!farmId) {
        alert("Please enter a Farm ID before enabling Cloud Auto-Sync.");
        document.getElementById('autoSyncToggle').checked = false;
        return;
      }

      localStorage.setItem('sfl_farm_id', farmId);
      localStorage.setItem('sfl_auto_sync', isChecked);

      statusDiv.style.color = '#ffffff';
      statusDiv.innerText = "Connecting to Render server...";

      try {
        const endpoint = isChecked 
          ? `${BACKEND_URL}/api/register-auto-sync`
          : `${BACKEND_URL}/api/unregister-auto-sync`;

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ farmId: farmId })
        });

        const data = await response.json();

        if (data.success) {
          statusDiv.style.color = "#00fff5";
          statusDiv.innerText = isChecked 
            ? `✅ Cloud Auto-Sync registered for Farm #${farmId} (Runs daily at 00:00 UTC)!` 
            : `Auto-sync disabled for Farm #${farmId}.`;
        } else {
          throw new Error(data.error || 'Server request failed');
        }
      } catch (err) {
        statusDiv.style.color = "#e94560";
        statusDiv.innerText = `❌ Could not connect to Render sync server.`;
        document.getElementById('autoSyncToggle').checked = !isChecked;
      }
    }
  </script>
</body>
</html>
