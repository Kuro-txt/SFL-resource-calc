<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFL Calculator & Auto Sync</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a2e;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #16213e;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      margin-top: 0;
      color: #e94560;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: white;
      box-sizing: border-box;
      font-size: 16px;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding: 12px;
      background: #0f3460;
      border-radius: 8px;
    }

    /* Custom CSS Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #4e4e50;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00fff5;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    #statusMessage {
      margin-top: 15px;
      font-size: 14px;
      min-height: 20px;
    }

    .success { color: #00fff5; }
    .error { color: #ff4b5c; }
  </style>
</head>
<body>

  <div class="card">
    <h2>🌻 SFL Farm Auto-Sync</h2>

    <div class="form-group">
      <label for="farmId">Farm ID:</label>
      <input type="number" id="farmId" placeholder="e.g. 12345" value="12345">
    </div>

    <div class="toggle-container">
      <span>⚡ Auto Sync (00:00 UTC)</span>
      <label class="switch">
        <input type="checkbox" id="autoSyncToggle" onchange="toggleAutoSync()">
        <span class="slider"></span>
      </label>
    </div>

    <div id="statusMessage"></div>
  </div>

  <script>
    // Live Render URL
    const BACKEND_URL = "https://sfl-calculator-backend.onrender.com";

    // Load saved settings on page startup
    window.addEventListener('DOMContentLoaded', () => {
      const savedFarmId = localStorage.getItem('sfl_farm_id');
      const isAutoSyncOn = localStorage.getItem('sfl_auto_sync') === 'true';

      if (savedFarmId) {
        document.getElementById('farmId').value = savedFarmId;
      }

      document.getElementById('autoSyncToggle').checked = isAutoSyncOn;
    });

    // Handle Toggle Switch Toggle
    async function toggleAutoSync() {
      const farmId = document.getElementById('farmId').value.trim();
      const isChecked = document.getElementById('autoSyncToggle').checked;
      const statusDiv = document.getElementById('statusMessage');

      if (!farmId) {
        alert("Please enter a valid Farm ID first.");
        document.getElementById('autoSyncToggle').checked = false;
        return;
      }

      // Save preference locally
      localStorage.setItem('sfl_farm_id', farmId);
      localStorage.setItem('sfl_auto_sync', isChecked);

      statusDiv.className = "";
      statusDiv.innerText = "Updating settings...";

      try {
        const endpoint = isChecked 
          ? `${BACKEND_URL}/api/register-auto-sync`
          : `${BACKEND_URL}/api/unregister-auto-sync`;

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ farmId: farmId })
        });

        const data = await response.json();

        if (data.success) {
          statusDiv.className = "success";
          statusDiv.innerText = isChecked 
            ? `✅ Auto-sync registered for Farm #${farmId}!` 
            : `Disabled auto-sync for Farm #${farmId}.`;
        } else {
          throw new Error(data.error || 'Server request failed');
        }
      } catch (err) {
        statusDiv.className = "error";
        statusDiv.innerText = `❌ Error: Could not connect to sync server.`;
        // Revert switch state on error
        document.getElementById('autoSyncToggle').checked = !isChecked;
      }
    }
  </script>

</body>
</html>
