<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFL Buddy Market Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pixel: ['"VT323"', 'monospace'],
            game: ['"Fredoka"', 'sans-serif'],
          },
          colors: {
            sfl: {
              green: '#3e8914',
              dirt: '#2b1e17',
              wood: '#633d1f',
              woodLight: '#8a5832',
              card: '#fff3db',
              cardBorder: '#c49a6c',
              gold: '#f2a900',
              accent: '#e76f51'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #2e531c;
      background-image: radial-gradient(#3a6923 15%, transparent 16%), radial-gradient(#3a6923 15%, transparent 16%);
      background-size: 30px 30px;
      background-position: 0 0, 15px 15px;
    }
    .sfl-panel {
      background-color: #fceade;
      border: 4px solid #5c3317;
      box-shadow: inset -4px -4px 0px #d4a373, 0px 8px 0px #1a0f07;
    }
    .sfl-input {
      background-color: #ffffff;
      border: 3px solid #8a5832;
      box-shadow: inset 2px 2px 0px #d9d9d9;
    }
    .sfl-btn {
      background-color: #e76f51;
      border: 3px solid #4a1e05;
      box-shadow: 0px 4px 0px #311302;
    }
    .sfl-btn:active {
      transform: translateY(2px);
      box-shadow: 0px 2px 0px #311302;
    }
  </style>
</head>
<body class="font-game text-sfl-dirt min-h-screen p-4 sm:p-8 flex items-center justify-center">

  <div class="w-full max-w-5xl sfl-panel rounded-2xl p-6 sm:p-8 relative">
    
    <div class="text-center mb-6">
      <div class="inline-block bg-sfl-wood text-amber-200 border-2 border-sfl-dirt px-6 py-1.5 rounded-full shadow-md">
        <h1 class="text-2xl sm:text-4xl font-pixel tracking-wider font-bold text-amber-300 flex items-center gap-2 justify-center">
          <span>🌻</span> SFL BUDDY CALCULATOR
        </h1>
      </div>
      <p class="text-xs font-semibold text-sfl-woodLight mt-2">Live item prices & farm inventory sync</p>
    </div>

    <!-- Farm Credentials Panel -->
    <div class="mb-6 bg-sfl-card/90 p-4 rounded-xl border-2 border-sfl-cardBorder">
      <h3 class="text-sm font-bold text-sfl-wood uppercase mb-2 flex items-center gap-2">
        <span>🔑</span> Farm Credentials (Saved Locally)
      </h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-bold text-sfl-wood mb-1">Farm ID</label>
          <input type="text" id="farm-id" placeholder="e.g. 12345" 
            class="w-full sfl-input rounded-lg px-3 py-1.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-sfl-wood mb-1">API Key / Token</label>
          <input type="password" id="api-key" placeholder="Paste Key or Token" 
            class="w-full sfl-input rounded-lg px-3 py-1.5 text-sm">
        </div>
      </div>
      <button id="import-farm-btn" class="mt-3 w-full bg-sfl-wood text-amber-200 font-bold py-2 rounded-lg border-2 border-sfl-dirt text-sm hover:bg-sfl-woodLight transition">
        🔄 Sync Farm Quantities
      </button>
      <p id="sync-status" class="text-xs text-center mt-2 font-bold text-sfl-woodLight"></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
      
      <!-- LEFT SIDE: Item Selector -->
      <div class="bg-sfl-card/80 p-5 rounded-xl border-2 border-sfl-cardBorder space-y-4">
        <h2 class="text-lg font-bold text-sfl-wood border-b-2 border-sfl-cardBorder pb-2 flex items-center gap-2">
          <span>📦</span> Select Item
        </h2>

        <div class="relative">
          <label class="block text-xs font-bold uppercase tracking-wider text-sfl-wood mb-1">🔍 Search & Select Item</label>
          <input type="text" id="combobox-input" placeholder="Type to search..." autocomplete="off"
            class="w-full sfl-input rounded-lg px-3 py-2 text-sm text-sfl-dirt focus:outline-none focus:ring-2 focus:ring-sfl-gold">
          
          <ul id="combobox-menu" class="hidden absolute left-0 right-0 top-full mt-1 max-h-48 overflow-y-auto bg-white border-2 border-sfl-woodLight rounded-lg shadow-xl z-20 divide-y divide-sfl-cardBorder/30 text-sm">
            <li class="p-2 text-sfl-woodLight italic">Loading items...</li>
          </ul>
        </div>

        <div id="selected-item-badge" class="hidden bg-sfl-gold/20 border border-sfl-gold rounded-lg p-2 text-xs font-bold text-sfl-wood flex justify-between items-center">
          <span>Selected: <span id="selected-item-name" class="text-sfl-green font-extrabold">None</span></span>
          <span id="selected-item-price" class="font-mono text-sfl-dirt">0 SFL</span>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="block text-xs font-bold uppercase tracking-wider text-sfl-wood">🔢 Quantity</label>
            <span id="inventory-hint" class="text-[11px] font-bold text-sfl-green hidden">Farm Stock: <span id="stock-count">0</span></span>
          </div>
          <input type="number" id="quantity" value="1" min="1" 
            class="w-full sfl-input rounded-lg px-3 py-2 text-sm text-sfl-dirt focus:outline-none focus:ring-2 focus:ring-sfl-gold">
        </div>

        <button id="add-btn" 
          class="w-full sfl-btn text-white font-bold py-3 rounded-xl transition text-base tracking-wide flex items-center justify-center gap-2 mt-2">
          <span>🧺</span> Add to Farm Basket
        </button>
      </div>

      <!-- RIGHT SIDE: Basket Table -->
      <div class="flex flex-col h-full space-y-4">
        
        <div class="bg-white/70 border-2 border-sfl-cardBorder rounded-xl overflow-hidden flex-grow shadow-sm">
          <div class="bg-sfl-wood text-amber-200 px-4 py-2 text-xs font-bold uppercase tracking-wider border-b-2 border-sfl-dirt flex justify-between items-center">
            <span>🛒 Farm Basket</span>
            <div class="flex items-center gap-2">
              <button id="clear-basket" class="text-[10px] bg-sfl-accent text-white px-2 py-0.5 rounded font-bold hover:bg-red-700">Clear</button>
              <span id="item-count" class="text-amber-300 font-mono">0 Items</span>
            </div>
          </div>

          <div class="max-h-[320px] overflow-y-auto">
            <table class="w-full text-left text-sm text-sfl-dirt">
              <thead class="text-xs uppercase bg-sfl-card border-b-2 border-sfl-cardBorder text-sfl-wood">
                <tr>
                  <th class="px-4 py-2">Item</th>
                  <th class="px-4 py-2">Qty</th>
                  <th class="px-4 py-2">Subtotal</th>
                  <th class="px-4 py-2 text-right">Action</th>
                </tr>
              </thead>
              <tbody id="basket-body" class="divide-y divide-sfl-cardBorder/50 font-medium">
                <tr>
                  <td colspan="4" class="px-4 py-8 text-center text-sfl-woodLight italic">
                    Your farm basket is empty!
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="bg-sfl-gold/20 border-2 border-sfl-gold rounded-xl p-4 text-center shadow-inner">
          <span class="text-xs font-bold uppercase tracking-widest text-sfl-wood">Total SFL Value</span>
          <h2 id="total-sfl" class="text-3xl font-pixel font-bold text-sfl-wood mt-0.5">0.0000 SFL</h2>
        </div>

      </div>

    </div>

  </div>

  <script>
    let allPrices = {};
    let basket = [];
    let selectedItemKey = null;
    let farmInventoryData = {}; // Stores farm inventory in background memory

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('sfl_farm_id')) {
        document.getElementById('farm-id').value = localStorage.getItem('sfl_farm_id');
      }
      if (localStorage.getItem('sfl_api_key')) {
        document.getElementById('api-key').value = localStorage.getItem('sfl_api_key');
      }
    });

    document.getElementById('farm-id').addEventListener('input', (e) => localStorage.setItem('sfl_farm_id', e.target.value));
    document.getElementById('api-key').addEventListener('input', (e) => localStorage.setItem('sfl_api_key', e.target.value));

    fetch('/api/get-data')
      .then(res => res.json())
      .then(rawData => {
        allPrices = extractPrices(rawData);
      });

    function extractPrices(data) {
      let pricesMap = {};
      function searchObj(obj, category = '') {
        for (let key in obj) {
          let val = obj[key];
          if (typeof val === 'number') {
            pricesMap[category + key] = val;
          } else if (val && typeof val === 'object') {
            let p = val.price || val.sfl || val.sflPrice;
            if (p !== undefined) pricesMap[category + key] = parseFloat(p);
            else searchObj(val, key.length <= 4 ? `[${key.toUpperCase()}] ` : '');
          }
        }
      }
      searchObj(data);
      return pricesMap;
    }

    // Background Sync Inventory Only
    document.getElementById('import-farm-btn').addEventListener('click', () => {
      const farmId = document.getElementById('farm-id').value.trim();
      const apiKey = document.getElementById('api-key').value.trim();
      const status = document.getElementById('sync-status');

      if (!farmId) {
        status.textContent = '❌ Please enter a Farm ID.';
        return;
      }

      status.textContent = '⏳ Fetching farm data...';

      fetch(`/api/get-farm?farmId=${encodeURIComponent(farmId)}&apiKey=${encodeURIComponent(apiKey)}`)
        .then(res => res.json())
        .then(data => {
          if (data.error) throw new Error(data.error);

          const farmData = data.farm?.farm || data.farm?.data || data.farm;
          farmInventoryData = farmData?.inventory || {};

          let totalItemsCount = Object.keys(farmInventoryData).length;

          if (totalItemsCount > 0) {
            status.textContent = `✅ Synced ${totalItemsCount} item types from Farm #${farmId}! Select any item to auto-fill stock quantity.`;
          } else {
            status.textContent = `⚠️ Connected, but no inventory found on farm.`;
          }
        })
        .catch(err => {
          status.textContent = '❌ Sync Error: ' + err.message;
        });
    });

    const input = document.getElementById('combobox-input');
    const menu = document.getElementById('combobox-menu');

    input.addEventListener('input', () => {
      const query = input.value.toLowerCase();
      menu.innerHTML = '';

      const matches = Object.keys(allPrices)
        .filter(key => key.toLowerCase().includes(query))
        .sort();

      if (matches.length === 0) {
        menu.innerHTML = '<li class="p-2 text-sfl-woodLight italic">No items found</li>';
      } else {
        matches.forEach(item => {
          const li = document.createElement('li');
          li.className = 'p-2.5 hover:bg-amber-100 cursor-pointer transition flex justify-between items-center';
          li.innerHTML = `<span class="font-bold text-sfl-dirt">${item}</span><span class="text-sfl-green font-mono text-xs">${allPrices[item]} SFL</span>`;
          li.addEventListener('click', () => selectItem(item));
          menu.appendChild(li);
        });
      }

      menu.classList.remove('hidden');
    });

    input.addEventListener('focus', () => input.dispatchEvent(new Event('input')));

    document.addEventListener('click', (e) => {
      if (!input.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.add('hidden');
      }
    });

    function selectItem(itemKey) {
      selectedItemKey = itemKey;
      input.value = itemKey;
      menu.classList.add('hidden');

      document.getElementById('selected-item-badge').classList.remove('hidden');
      document.getElementById('selected-item-name').textContent = itemKey;
      document.getElementById('selected-item-price').textContent = `${allPrices[itemKey]} SFL`;

      // Clean item name to check background farm inventory
      let cleanSelected = itemKey.replace(/^\[.*?\]\s*/, '').toLowerCase().replace(/[^a-z0-9]/g, '');
      let foundStock = 0;

      for (let invKey in farmInventoryData) {
        let cleanInvKey = invKey.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (cleanInvKey === cleanSelected) {
          let val = farmInventoryData[invKey];
          foundStock = typeof val === 'number' ? val : parseFloat(val.amount || val || 0);
          break;
        }
      }

      // Auto-fill quantity box if stock is found!
      if (foundStock > 0) {
        document.getElementById('quantity').value = foundStock;
        document.getElementById('inventory-hint').classList.remove('hidden');
        document.getElementById('stock-count').textContent = foundStock;
      } else {
        document.getElementById('quantity').value = 1;
        document.getElementById('inventory-hint').classList.add('hidden');
      }
    }

    document.getElementById('add-btn').addEventListener('click', () => {
      const qty = parseFloat(document.getElementById('quantity').value) || 0;

      if (!selectedItemKey || qty <= 0) return;

      const unitPrice = allPrices[selectedItemKey] || 0;
      const subtotal = unitPrice * qty;

      basket.push({ item: selectedItemKey, qty, unitPrice, subtotal });
      updateBasketTable();
    });

    document.getElementById('clear-basket').addEventListener('click', () => {
      basket = [];
      updateBasketTable();
    });

    function updateBasketTable() {
      const tbody = document.getElementById('basket-body');
      tbody.innerHTML = '';

      let grandTotal = 0;

      if (basket.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-4 py-8 text-center text-sfl-woodLight italic">Your farm basket is empty!</td></tr>';
      } else {
        basket.forEach((entry, index) => {
          grandTotal += entry.subtotal;
          let tr = document.createElement('tr');
          tr.className = "hover:bg-amber-50/50 transition";
          
          let subtotalDisplay = entry.unitPrice > 0 
            ? `${entry.subtotal.toFixed(4)} SFL` 
            : `<span class="text-sfl-woodLight font-normal">Untradeable</span>`;

          tr.innerHTML = `
            <td class="px-4 py-2.5 font-bold text-sfl-dirt">${entry.item}</td>
            <td class="px-4 py-2.5 font-mono">${entry.qty}</td>
            <td class="px-4 py-2.5 text-sfl-green font-bold">${subtotalDisplay}</td>
            <td class="px-4 py-2.5 text-right">
              <button onclick="removeItem(${index})" class="text-sfl-accent hover:text-red-700 font-bold px-2">✕</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('total-sfl').textContent = `${grandTotal.toFixed(4)} SFL`;
      document.getElementById('item-count').textContent = `${basket.length} Item${basket.length === 1 ? '' : 's'}`;
    }

    function removeItem(index) {
      basket.splice(index, 1);
      updateBasketTable();
    }
  </script>

</body>
</html>
